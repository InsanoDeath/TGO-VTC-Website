    <script type="text/javascript" src="https://unpkg.com/showdown/dist/showdown.min.js"></script>
    <script>
        const details = document.getElementById("details");
        const title = document.querySelector(".heading");

        const months = [
            "",
            "JAN",
            "FEB",
            "MAR",
            "APR",
            "MAY",
            "JUN",
            "JUL",
            "AUG",
            "SEP",
            "OCT",
            "NOV",
            "DEC"
        ]

        const params = new Proxy(new URLSearchParams(window.location.search), {
            get: (searchParams, prop) => searchParams.get(prop),
        });
        let event = params.event; // "some_value"

        fetch(`https://hub.indiantruckers.company/api/tmp?endpoint=events/${event}`).then((body) => {
            return body.json();
        }).then((json) => {
            if (!json.error) {
                const { response } = json;

                var converter = new showdown.Converter();

                title.innerHTML = response.name;

                console.log(response)
                const div = document.createElement("div");
                div.classList.add("blog_details_inner");
                div.innerHTML = `<div class="post_img">
                                    <img src="${response.banner}" alt="${response.name}">
                                </div>
                                <div class="post_content">
                                    <div class="post_header">
                                        <h3 class="post_title">${response.name}</h3>
                                    </div>
                                    <div class="fulltext">
                                        ${converter.makeHtml(response.description)}
                                    </div>
                                    <div class="btm-box d-flex align-items-center mb-40">
                                        <a href="https://truckersmp.com/events/${response.id}" target="_blank" class="theme-btn btn-style-one">
                                            <span class="btn-title">View More Details</span>
                                        </a>
                                    </div>
                                </div>`;

                details.appendChild(div);
            }
        }).catch((err) => {
            console.log(err);
        })
    </script>
