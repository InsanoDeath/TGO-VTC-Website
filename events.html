    <script>
        const eventDiv = document.getElementById("eventDiv");

        const months = [
            "",
            "JAN",
            "FEB",
            "MAR",
            "APR",
            "MAY",
            "JUN",
            "JUL",
            "AUG",
            "SEP",
            "OCT",
            "NOV",
            "DEC"
        ]

        fetch("https://hub.indiantruckers.company/api/tmp?endpoint=vtc/619/events").then((body) => {
            return body.json();
        }).then((json) => {
            if (!json.error) {
                const response = json.response.filter(f => new Date(f.start_at).getTime() >= Date.now());
                console.log(response)
                response.forEach((r) => {
                    const div = document.createElement("div");
                    div.classList.add("col-lg-4");
                    div.classList.add("col-md-6");
                    div.innerHTML = `<div class="iconbox">
                                        <div class="iconbox_wrapper">
                                            <div class="iconbox_image">
                                                <img src="${r.banner}" alt="${r.name}">
                                                <div class="iconbox_icon">
                                                    <a href="javascript:void(0)">
                                                        <span class="date"><b>${r.start_at.split(" ")[0].split("-")[2]}</b> ${months[parseInt(r.start_at.split(" ")[0].split("-")[1])]}</span>
                                                    </a>
                                                </div>
                                            </div>
                                            <div class="iconbox_content">
                                                <h3>
                                                    <a href="convoy.html?event=${r.id}">
                                                        ${r.name}
                                                    </a>
                                                </h3>
                                                <div class="read_more">
                                                    <a href="convoy.html?event=${r.id}"><span>Read More</span></a>
                                                </div>
                                            </div>
                                        </div>
                                    </div>`;

                    eventDiv.appendChild(div);
                })
            }
        }).catch((err) => {
            console.log(err);
        })
    </script>
